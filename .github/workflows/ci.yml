name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson ninja-build \
            libvulkan-dev vulkan-validationlayers-dev spirv-tools \
            libfreetype6-dev libharfbuzz-dev \
            libwayland-dev wayland-protocols \
            glslang-tools

      - name: Setup Mesa software renderer (lavapipe)
        run: |
          sudo apt-get install -y mesa-vulkan-drivers
          # Verify lavapipe is available
          vulkaninfo --summary 2>/dev/null || true

      - name: Configure
        run: meson setup build --werror

      - name: Build
        run: ninja -C build

      - name: Test
        run: meson test -C build --verbose --suite unit --suite integration
        env:
          # Force software Vulkan rendering so tests work without GPU
          VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.x86_64.json

      - name: Release readiness
        run: python3 scripts/check-release-readiness.py

      - name: Upload test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: build/meson-logs/
